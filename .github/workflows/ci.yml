# CI — runs on every PR. Build, scan, sign, SBOM. NO deploy from PRs (deploy.yml handles main).
# ML overlay (M3+): an MLflow registry stage that updates vLLM `--model=s3://...@version`
# in Helm values is added on top of this container pipeline.
name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write      # OIDC for cosign keyless signing
  security-events: write  # Trivy SARIF upload

jobs:
  lint-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: astral-sh/setup-uv@v3
      - name: Lint + test (app)
        working-directory: app
        run: |
          uv sync --extra dev
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run pytest -q
      - name: Lint Airflow DAGs (pipelines)
        working-directory: pipelines
        run: uv run --with "ruff>=0.7" ruff check dags || true   # airflow.sdk imports don't resolve locally; report only

  helm:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with: { version: "v3.16.3" }
      - name: Lint chart
        run: helm lint helm/mlops-platform
      - name: Pin + build deps (local chart only)
        run: |
          # Active deps are HTTP-repo charts (qdrant, ingress-nginx). helm dep build pulls them.
          helm dependency build helm/mlops-platform
      - name: Template render (kind values)
        run: helm template mlops helm/mlops-platform -f helm/mlops-platform/values-kind.yaml --namespace mlops > /tmp/rendered.yaml
      - name: Validate rendered manifests (kubeconform)
        run: |
          curl -sSfL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64 -o /usr/local/bin/kubeconform
          chmod +x /usr/local/bin/kubeconform
          kubeconform -strict -summary /tmp/rendered.yaml

  build-scan-sign:
    needs: lint-test
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [app, pipelines, ui]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          # app/ui: context is that package dir (Dockerfile copies it). pipelines: context=.
          # (Dockerfile.pipelines copies the pipelines/ package from repo root). The UI build
          # needs no Clerk secrets at build time — Clerk keys are runtime env (NEXT_PUBLIC_*
          # can be passed as build-args via `with: build-args:` when wiring prod Clerk later).
          context: ${{ matrix.target == 'pipelines' && '.' || matrix.target }}
          file: docker/Dockerfile.${{ matrix.target }}
          tags: ghcr.io/${{ github.repository }}/${{ matrix.target }}:sha-${{ github.sha }}
          load: true
      - name: Trivy scan (fail HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.target }}:sha-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-${{ matrix.target }}.sarif
      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.target }}.sarif
      - name: SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
          ./bin/syft ghcr.io/${{ github.repository }}/${{ matrix.target }}:sha-${{ github.sha }} -o spdx-json > sbom-${{ matrix.target }}.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.target }}
          path: sbom-${{ matrix.target }}.spdx.json
      # cosign keyless signing (OIDC). Image is pushed to GHCR on main only (below).
      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push + sign (main only)
        if: github.event_name == 'push'
        run: |
          docker push ghcr.io/${{ github.repository }}/${{ matrix.target }}:sha-${{ github.sha }}
          curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          cosign sign --yes ghcr.io/${{ github.repository }}/${{ matrix.target }}:sha-${{ github.sha }}