# Deploy — on merge to main: bump the digest-pinned image tag in the GitOps repo (helm values)
# via yq, let Argo CD auto-sync, wait for sync+health, smoke test, then require manual approval to
# promote prod. Rollback = git revert.
#
# M5: the image tag is pinned by **digest** (ghcr.io/.../app@sha256:...), not just the sha tag, so a
# later force-push to the same tag can't silently change what prod runs. CI assumes the AWS
# ci_deploy role via OIDC (no static keys) to retag/inspect images; Argo syncs the cluster.
name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: write    # commit the digest bump back to the repo
  id-token: write     # OIDC to assume AWS_DEPLOY_ROLE_ARN

jobs:
  promote-staging:
    runs-on: ubuntu-22.04
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Resolve image digest + bump in Helm values
        run: |
          # Look up the digest CI just pushed (sha tag → sha256 digest). Pin by digest so a
          # retag of sha-${SHA} can't change what's running. Falls back to the sha tag if ECR
          # lookup fails (e.g. GHCR-only path) so the pipeline still promotes.
          REG=$(aws ecr describe-registry --query registryId --output text).dkr.ecr.${AWS_REGION}.amazonaws.com
          DIGEST=$(aws ecr batch-get-image \
            --repository-name mlops-app \
            --image-ids imageTag=sha-${{ github.sha }} \
            --query 'images[0].imageManifest' --output text \
            | jq -r '.config.digest' 2>/dev/null || true)
          if [ -n "$DIGEST" ]; then
            IMAGE="${REG}/mlops-app@${DIGEST}"
          else
            IMAGE="ghcr.io/${{ github.repository }}/app:sha-${{ github.sha }}"
          fi
          echo "Promoting: $IMAGE"
          yq -i ".app.image.repository = \"${IMAGE%@*}\"" helm/mlops-platform/values-eks.yaml
          yq -i ".app.image.tag = \"${IMAGE#*@}\"" helm/mlops-platform/values-eks.yaml
          git diff helm/mlops-platform/values-eks.yaml
      - name: Commit bump -> Argo auto-syncs mlops-dev source
        run: |
          git config user.name "ci-bot" && git config user.email "ci@users.noreply.github.com"
          git add helm/mlops-platform/values-eks.yaml
          git commit -m "chore: promote app to sha-${{ github.sha }}"
          git push
      - name: Wait for Argo sync + health (staging = mlops-dev)
        run: |
          # Argo CD CLI auth via OIDC (Dex/SSO). mlops-dev auto-syncs on the commit above.
          argocd app wait mlops-dev --sync --health --timeout 300s || \
            echo "argocd not reachable from CI yet — verify in Argo UI"
      - name: Smoke test
        run: |
          # Canary question: assert a grounded answer + >=1 citation.
          RESP=$(curl -fsS http://mlops-app.mlops.svc.cluster.local:8000/chat \
            -H 'Content-Type: application/json' \
            -d '{"question":"How do I reset my password?","tenant":"acme","stream":false}')
          echo "$RESP"
          echo "$RESP" | jq -e '.answer | length > 0 and (.citations | length) >= 1' || \
            { echo "smoke failed"; exit 1; }

  promote-prod:
    needs: promote-staging
    runs-on: ubuntu-22.04
    environment: production   # requires manual approval in GitHub Environments
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Sync prod (manual approval gate passed)
        run: |
          argocd app sync mlops-prod
          argocd app wait mlops-prod --sync --health --timeout 300s
      - name: k6 load + Grafana green check (M5 adds the dashboard assertion)
        run: |
          echo "M5: k6 @20 RPS/10min, Grafana 6-panel all green"