# values-generic.yaml — cloud-agnostic (GKE/AKS/OpenShift) (M6). No AWS-specifics; uses
# ingress-nginx + cert-manager + Let's Encrypt. Storage is ReadWriteOnce + an S3/MinIO/GCS
# abstraction for model weights. Filled out at M6 alongside the Next.js UI + Clerk auth.

namespace: mlops

qdrant:
  enabled: true
  persistence:
    storageClassName: standard        # cloud default (gp2/Premium/standard)
    size: 20Gi

ingressNginx:
  enabled: true                        # generic ingress + cert-manager + Let's Encrypt

ollama:
  enabled: false
tei:
  enabled: true
  gpu: false
  persistence:
    storageClassName: standard
    size: 20Gi

app:
  image:
    repository: ghcr.io/<org>/mlops-app
    tag: "0.1.0"
    pullPolicy: Always
  replicaCount: 2
  ingress:
    enabled: true
    className: nginx
    host: rag.example.com
    tls: true                          # cert-manager issues Let's Encrypt cert
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpuAverageUtilization: 70

# Customer-facing UI (M6). Cloud-agnostic: ingress-nginx + cert-manager + Let's Encrypt.
# Clerk keys come from External Secrets (set clerkPublishableKey/clerkSecretKey here only for
# a non-prod dry run). The UI proxies to the app via the in-cluster service.
ui:
  enabled: true
  image:
    repository: ghcr.io/<org>/mlops-ui
    tag: "0.1.0"
    pullPolicy: Always
  replicaCount: 2
  backendUrl: http://mlops-app:8000
  clerkPublishableKey: ""           # set via External Secrets in prod (NEXT_PUBLIC_*, non-secret)
  clerkSecretKey: ""                 # server-only; External Secrets in prod
  localDevTenant: acme
  resources:
    requests: {cpu: "100m", memory: "256Mi"}
    limits: {cpu: "500m", memory: "512Mi"}
  ingress:
    enabled: true
    className: nginx
    host: ui.example.com
    tls: true                         # cert-manager issues Let's Encrypt cert
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: "2m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpuAverageUtilization: 70