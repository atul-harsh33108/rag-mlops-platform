{{/* vLLM serving (M5) — Qwen3-14B AWQ on a Karpenter GPU node, model weights read from S3 via
    the Mountpoint CSI driver (ReadOnlyMany PV — ~95% cheaper than EBS). Gated by
    .Values.vllm.enabled. The ServiceAccount carries the IRSA role for s3:GetObject on the
    models bucket (created by terraform module.vllm_irsa). LiteLLM routes to this service as
    the primary provider; Bedrock is the fallback (Bifrost cascade). */}}
{{- if .Values.vllm.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-sa
  namespace: {{ include "mlops.namespace" . }}
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: mlops-platform
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.vllm.irsaRoleArn | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mlops.fullname" . }}-vllm
  namespace: {{ include "mlops.namespace" . }}
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: mlops-platform
spec:
  replicas: {{ .Values.vllm.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      serviceAccountName: vllm-sa
      # Karpenter GPU pool (tainted nvidia.com/gpu=NoSchedule); tolerate the taint to land there.
      nodeSelector:
        pool: gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
      # Give AWS Node Termination Handler time to drain in-flight requests to Bedrock on Spot kill.
      terminationGracePeriodSeconds: 300
      containers:
        - name: vllm
          image: {{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}
          imagePullPolicy: {{ .Values.vllm.image.pullPolicy }}
          args:
            - --model=s3://{{ .Values.vllm.model.s3Path }}
            - --served-model-name={{ .Values.vllm.model.name }}
            - --quantization=awq
            - --max-model-len=8192
            - --gpu-memory-utilization=0.90
            - --otlp-traces-endpoint=http://otel-collector.monitoring.svc.cluster.local:4318
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 40 # first load lazy-pulls from S3 (Mountpoint); be patient
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "mlops.fullname" . }}-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mlops.fullname" . }}-models
  namespace: {{ include "mlops.namespace" . }}
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: mlops-platform
spec:
  accessModes: ["ReadOnlyMany"]
  storageClassName: s3-mountpoint
  resources:
    requests:
      storage: 50Gi # advisory; S3-backed, not actually reserved
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mlops.fullname" . }}-vllm
  namespace: {{ include "mlops.namespace" . }}
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/part-of: mlops-platform
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
  selector:
    app.kubernetes.io/name: vllm
{{- end }}