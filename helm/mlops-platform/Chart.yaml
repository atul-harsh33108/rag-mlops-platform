apiVersion: v2
name: mlops-platform
description: |
  Production-grade RAG MLOps platform — umbrella chart. Deploys the FastAPI RAG app +
  Qdrant + (optionally) Ollama/TEI for embeddings + the full MLOps stack (MLflow,
  Langfuse, LiteLLM, Airflow, Argo CD). One chart, three value files: values-kind.yaml
  (local K8s), values-eks.yaml (AWS, M5), values-generic.yaml (any K8s, M6).
type: application
version: 0.1.0
appVersion: "0.1.0"
icon: https://qdrant.tech/img/logo.png
maintainers:
  - name: mlops-platform

# Active remote dependencies (HTTP repos, verified resolvable). `helm dep build` pulls
# these. The app subchart is local (charts/app) and bundled automatically — not listed here.
dependencies:
  - name: qdrant
    version: 0.7.6
    repository: https://qdrant.github.io/qdrant-helm
    condition: qdrant.enabled
  - name: ingress-nginx
    version: 4.11.2
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingressNginx.enabled

